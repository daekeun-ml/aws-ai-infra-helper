# Qwen3-VL-30B-A3B | 16 GPU (2 nodes) | H100 / H200
# 컨테이너 VLM은 PP>1 미지원 (model_chunks 빈 리스트 오류)
# PP=1로 강제: DP = 16 / (1*1*8) = 2, GA = 512 / (1*2) = 256y
GBS=512
MBS=4
TP=1
PP=2
CP=1
VP=
EP=8
FSDP=0
NO_CUDA_GRAPHS=1    # Qwen3-VL: mRoPE 가변 시퀀스 길이로 CUDA graph 비호환 → 반드시 비활성화
GA=                 # 설정 시 GBS 자동 역산: GBS = MBS * GA * DP. 비워두면 GBS 직접 사용