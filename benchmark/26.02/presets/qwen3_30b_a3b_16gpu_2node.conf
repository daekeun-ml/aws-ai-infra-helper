# Qwen3-30B-A3B | 16 GPU (2 nodes) | H100 / H200
# DP = world_size / (TP * PP * EP) = 16 / (1*2*8) = 1
# GA = GBS / (MBS * DP) = 512 / (2*1) = 256... spec says 32
# GBS=512, MBS=2, GA=32 → effective DP=8 (GBS = MBS * GA * DP = 2*32*8 = 512 ✓)
GBS=512
MBS=2
TP=1
PP=2
CP=1
VP=24
EP=8
FSDP=0
NO_CUDA_GRAPHS=0    # 1로 설정 시 CUDA graphs 비활성화 (--cuda_graph_impl none)
GA=                 # 설정 시 GBS 자동 역산: GBS = MBS * GA * DP. 비워두면 GBS 직접 사용
# SEQ_LEN=4096  # Qwen3 config에 하드코딩됨, 변경 불필요
