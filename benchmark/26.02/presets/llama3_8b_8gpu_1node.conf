# Llama3 8B | 8 GPU (1 node) | Dense model (no MoE)
# DP = world_size / (TP * PP * CP) = 8 / (1*1*1) = 8
# GA = GBS / (MBS * DP) = 128 / (2 * 8) = 8 ✓
GBS=128
MBS=2
TP=1
PP=1
CP=1
VP=     # Dense model, PP=1이므로 VP 불필요
EP=     # Dense model (no experts)
FSDP=0
NO_CUDA_GRAPHS=1    # 1로 설정 시 CUDA graphs 비활성화 (--cuda_graph_impl none)
GA=                 # 설정 시 GBS 자동 역산: GBS = MBS * GA * DP. 비워두면 GBS 직접 사용
