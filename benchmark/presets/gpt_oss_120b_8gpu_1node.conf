# GPT-OSS 120B (MoE) | 8 GPU (1 node) | bf16 only
# TP=8 필수: 120B params / 8 = 15B per GPU = 30GB bf16 (80GB H100 기준)
# DP = 8 / (8*1*1) = 1 → EP는 DP 이하여야 하므로 EP=1 강제
# GA = GBS / (MBS * DP) = 8 / (1 * 1) = 8
# FSDP=1: optimizer states (~150GB) 분산 필수 (Adam fp32 states가 params의 약 10배)
# 주의: 속도 매우 느림. 기능 검증 용도로 사용 권장
GBS=8
MBS=1
TP=8
PP=1
CP=1
VP=     # PP=1이므로 VP 불필요
EP=1
FSDP=1
